services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: next5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - next5-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d next5"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  next5-postgres:
